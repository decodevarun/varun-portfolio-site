<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contact | Alex Carter</title>
    <meta name="description" content="Contact Alex Carter for SEO and performance marketing consulting." />
    <link rel="stylesheet" href="assets/css/styles.css" />
    <script defer src="assets/js/main.js"></script>
  </head>
  <body>
    <header class="site-header">
      <div class="container nav">
        <a class="brand" href="index.html">Alex Carter</a>
        <button class="nav-toggle" aria-label="Open menu" aria-expanded="false">Menu</button>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="services.html">Services</a></li>
          <li><a href="portfolio.html">Portfolio</a></li>
          <li><a aria-current="page" href="contact.html">Contact</a></li>
        </ul>
      </div>
    </header>

    <main class="container">
      <section class="section">
        <p class="eyebrow">Contact</p>
        <h1>Let's grow your next stage.</h1>
        <div class="contact-layout">
          <div class="card">
            <h2>Get in touch</h2>
            <p>Share your goals and I will send a practical growth plan within 48 hours.</p>
            <p><strong>Email:</strong> hello@alexcartergrowth.com</p>
          </div>
          <form class="card" id="contact-form" novalidate>
            <div class="form-row">
              <label for="name">Name</label>
              <input id="name" name="name" type="text" autocomplete="name" required />
            </div>
            <div class="form-row">
              <label for="email">Email</label>
              <input id="email" name="email" type="email" autocomplete="email" required />
            </div>
            <div class="form-row">
              <label for="message">Message</label>
              <textarea id="message" name="message" required></textarea>
            </div>
            <button class="button primary" type="submit">Send Message</button>
            <p id="form-feedback" class="helper" aria-live="polite"></p>
          </form>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">© 2026 Alex Carter. Built for speed, clarity, and conversions.</div>
    </footer>
  </body>
</html>
